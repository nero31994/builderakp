<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mobile App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 300px;
        }
        h1 { color: #1a73e8; font-size: 1.5rem; margin-bottom: 1rem; }
        p { color: #5f6368; line-height: 1.5; }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to Your App</h1>
        <p>This is a real mobile app built with HTML, CSS, and JS.</p>
        <button onclick="showAlert()">Tap Me!</button>
    </div>

    <script>
        function showAlert() {
            alert("Hello from your APK!");
        }
    </script>
</body>
</html>
